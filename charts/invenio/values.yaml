## Persistence
persistence:
  # -- Enable persistence volume claim
  enabled: true
  # -- Name of the PVC
  name: "shared-volume"
  # -- Persistent Volume Access Modes
  access_mode: ReadWriteMany
  # -- Additional Persistent Volume Claim annotations
  annotations: {}
  # -- Size of the volume
  size: 10G
  # -- Storage class of backing PVC
  ## If defined, storageClassName: <storageClass>
  ## If set to "-", storageClassName: "", which disables dynamic provisioning
  ## If undefined (the default) or set to null, no storageClassName spec is
  ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
  ##   GKE, AWS & OpenStack)
  storage_class: ""
  # -- Use an existing PVC to use for persistence
  useExistingClaim: false
  # -- Enable or disable usage of subPath for PVC mounts
  ## When enabled, each logical path is mounted using Kubernetes subPath,
  ## providing directory-level isolation within a single PVC.
  ## When disabled, the entire PVC is mounted at the base path and the
  ## application is responsible for managing internal directory structure.
  ## This option can improve compatibility with Kubernetes volume metrics
  ## (e.g. kubelet_volume_stats_used_bytes) in some CSI environments such as Ceph CSI.
  useSubPath: true

## Redis configuration
## ref: https://github.com/bitnami/charts/blob/main/bitnami/redis/values.yaml
redis:
  # -- Enable redis helm chart
  enabled: true
  auth:
    # -- Enable password authentication
    enabled: false  # Dangerous! This lets Invenio connect to Redis unauthenticated!
  image:
    # -- Sets bitnamilegacy by default
    repository: bitnamilegacy/redis  # Work-around until we've migrated away from Bitnami.
  master:
    # -- Disable commands
    disableCommands: []  # Dangerous! This lets us run the `FLUSHALL` and `FLUSHDB` commands! Unfortunately, they are required by the wipe_recreate.sh script when installing Invenio.
  replica:
    # -- Disable commands
    disableCommands: []  # Dangerous! This lets us run the `FLUSHALL` and `FLUSHDB` commands! Unfortunately, they are required by the wipe_recreate.sh script when installing Invenio.

# -- External redis configuration
## All of these values are only used when redis.enabled is set to false
redisExternal: {}
  # hostname: ""

