## Terminal
## Pods for running maintenance tasks.
terminal:
  # -- Enable the terminal deployment
  enabled: false
  # -- Number of replicas. Start with 0 to avoid resource usage
  replicas: 0
  # -- Extra environment variables to be added to the terminal pods
  extraEnvVars: []
  # -- Resources for the terminal container
  resources: {}
    # requests:
    #   cpu: 500m
    #   memory: 500Mi
    # limits:
    #   cpu: 1000m
    #   memory: 1Gi
  initContainers:
    # -- Resources for the copy-terminal-assets initContainer
    resources: {}
      # requests:
      #   cpu: '1'
      #   memory: 100Mi
      # limits:
      #   cpu: '1'
      #   memory: 100Mi
    # -- SecurityContext for the initContainers in the terminal pod
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
