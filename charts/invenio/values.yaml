---

## Global parameters
## Please, note that this will override the parameters, including dependencies, configured to use the global value
##
global:
  # -- Timezone
  timezone: "Europe/Zurich"

# -- String to partially override common.names.name
nameOverride: ""
# -- String to fully override common.names.fullname
fullnameOverride: ""

## Invenio image version
## ref: https://github.com/inveniosoftware/demo-inveniordm/pkgs/container/demo-inveniordm%2Fdemo-inveniordm
# @schema required
image:
  # @schema required
  # -- Invenio image registry
  registry: ghcr.io/inveniosoftware
  # @schema required
  # -- Invenio image repository
  repository: demo-inveniordm/demo-inveniordm
  # -- Invenio image tag (immutable tags are recommended). Defaults to .Chart.appVersion
  tag: ""
  # -- Invenio image digest in the way sha256:aa.... Please note this parameter, if set, will override the tag
  digest: ""
  # @schema enum:[Always, IfNotPresent, Never]
  # -- Invenio image pull policy
  ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
  ## ref: https://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
  pullPolicy: IfNotPresent
  # -- Invenio image pull secrets
  ## Secrets must be manually created in the namespace.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  ## e.g:
  ## pullSecrets:
  ##   - name: myRegistryKeySecretName
  pullSecrets: []

## Invenio ingress parameters
## ref: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  # -- Enable ingress record generation for Invenio.
  enabled: false
  # -- IngressClass that will be be used to implement the Ingress (Kubernetes 1.18+)
  ## This is supported in Kubernetes 1.18+ and required if you have more than one IngressClass marked as the default for your cluster.
  ## ref: https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/
  class: ""
  # -- Additional annotations for the Ingress resource. To enable certificate autogeneration, place here your cert-manager annotations.
  ## Use this parameter to set the required annotations for cert-manager, see
  ## ref: https://cert-manager.io/docs/usage/ingress/#supported-annotations
  ## e.g:
  ## annotations:
  ##   kubernetes.io/ingress.class: nginx
  ##   cert-manager.io/cluster-issuer: cluster-issuer-name
  annotations: {}
  # -- Custom TLS secret name.
  tlsSecretNameOverride: ""

## Openshift Route object
route:
  # -- Annotations to be added to the Route
  annotations: {}

# @schema required
invenio:
  # @schema required;minLength:1
  # -- Invenio hostname (templated) used in configuration variables like TRUSTED_HOSTS, SITE_HOSTNAME or SITE_URL
  hostname: ""
  # @schema deprecated
  # -- DEPRECATED: this is automatically generated now, or set by custom secret using invenio.existingSecret
  secret_key: ""
  # @schema deprecated
  # -- DEPRECATED: this is automatically generated now, or set by custom secret using invenio.existingSecret
  security_login_salt: ""
  # @schema deprecated
  # -- DEPRECATED: this is automatically generated now, or set by custom secret using invenio.existingSecret
  csrf_secret_salt: ""
  # @schema deprecated
  # -- DEPRECATED: this is automatically generated now, or set by custom secret using invenio.existingSecret
  existing_secret: false

  # -- General existing secret name for, at least, secret key and salts
  ## If not set a new secret will be generated automatically with random values
  ## ref: https://inveniordm.docs.cern.ch/customize/authentication/#security
  existingSecret: ""

  # -- Enable initial setup (create users, load demo data)
  init: false
  # @schema type:[object, array]
  # -- Default users to create. Requires invenio.init=true
  default_users: []
  # -- Load demo data. Requires invenio.init=true and default_users to be set
  demo_data: false

  sentry:
    # -- Enable Sentry.io integration
    enabled: false
    # -- Sentry DSN, required unless existingSecret is provided
    dsn: ""
    # @schema deprecated
    # -- DEPRECATED: use invenio.sentry.existingSecret instead
    secret_name: ""
    # @schema deprecated
    # -- DEPRECATED: use invenio.sentry.existingSecret instead
    existing_secret: false
    # -- Existing secret name for sentry's dsn
    existingSecret: ""
    # -- Secret keys configuration for sentry
    secretKeys:
      # -- Name of key in existing secret to use for dsn
      dsnKey: "SENTRY_DSN"

  ## Invenio DataCite configuration
  ## ref: https://inveniordm.docs.cern.ch/customize/dois
  datacite:
    # -- Enable DataCite provider
    enabled: false
    # -- Datacite username
    username: ""
    # -- Datacite password
    password: ""
    # -- Existing secret name for datacite username and password
    existingSecret: "datacite-secrets"
    # -- Secret keys configuration for datacite
    secretKeys:
      # -- Name of key in existing secret to use for username. Only used when `invenio.datacite.existingSecret` is set.
      usernameKey: "DATACITE_USERNAME"
      # -- Name of key in existing secret to use for password. Only used when `invenio.datacite.existingSecret` is set.
      passwordKey: "DATACITE_PASSWORD"
    # -- DataCite DOI prefix, it will translate into DATACITE_PREFIX
    prefix: ""
    # -- DataCite test mode enabled, it will translate into DATACITE_TEST_MODE
    ## This has to be a string value, Invenio will evaluate this as a python expression and transform it into a boolean.
    ## Example:
    ## testMode: "False"
    testMode: ""
    # -- A string used for formatting the DOI, it will translate into DATACITE_FORMAT
    format: ""
    # -- DataCite data center symbol, it will translate into DATACITE_DATACENTER_SYMBOL
    dataCenterSymbol: ""
    # @schema deprecated
    # -- DEPRECATED: use invenio.datacite.existingSecret instead
    existing_secret: false
    # @schema deprecated
    # -- DEPRECATED: use invenio.datacite.existingSecret instead
    secret_name: ""
  remote_apps:
    # -- Enable remote apps integration
    enabled: false
    # -- Use an existing secret for remote apps credentials
    existing_secret: false
    # -- Name of the existing secret for remote apps
    secret_name: "remote-apps-secrets"
    # @schema type:[object, array]
    # -- Remote apps credentials
    credentials: {}
      # - name: ""
      #   consumer_key: ""
      #   consumer_secret: ""
  # @schema deprecated
  # -- DEPRECATED: use invenio.extraConfig instead
  extra_config: {}
  # -- Extra environment variables (templated) to be added to all the pods
  extraConfig: {}
  # @schema deprecated
  # -- DEPRECATED: Use `invenio.extraEnvFrom` or `invenio.extraEnvVars` instead
  extra_env_from_secret: []
  # -- Extra environment variables to be added to all the pods
  extraEnvVars: []
  # -- Extra configuration variables (key: value) to be added to the uWSGI configuration file
  uwsgiExtraConfig: {}
  # -- Extra secretRef or configMapRef for the `envFrom` field in all Invenio containers (templated)
  extraEnvFrom: []
    # - secretRef:
    #     name: foo
    # - configMapRef:
    #     name: bar

  # -- Extra volumeMounts for all Invenio containers
  extraVolumeMounts: []

  # -- Extra volumes for all Invenio pods
  extraVolumes: []

  # -- Vocabularies to be loaded as files under /app_data/vocabularies
  ## Example
  ## vocabularies:
  ##   resource_types.yaml: |
  ##    - id: publication
  ##      icon: file alternate
  ##      props:
  ##        csl: report
  ##        datacite_general: Text
  ##        datacite_type: ""
  ##        openaire_resourceType: "0017"
  ##        openaire_type: publication
  ##        eurepo: info:eu-repo/semantics/other
  ##        schema.org: https://schema.org/CreativeWork
  ##        subtype: ""
  ##        type: publication
  ##        marc21_type: publication
  ##        marc21_subtype: ""
  ##      title:
  ##        en: Publication
  ##      tags:
  ##        - depositable
  ##        - linkable
  vocabularies: {}

## nginx configuration
# @schema required
nginx:
  # @schema required;minLength:1
  # -- Nginx image
  image: "nginx:1.31.1"
  # -- Maximum number of connections
  max_conns: 100
  # -- Assets configuration
  assets:
    # -- Location of the static assets
    location: /opt/invenio/var/instance/static
  # -- Records configuration
  records:
    # -- Client max body size for records
    client_max_body_size: 100m
  # -- Files configuration
  files:
    # -- Client max body size for files
    client_max_body_size: 50G
  # -- Resources for the nginx container
  resources: {}
    # requests:
    #   cpu: 250m
    #   memory: 500Mi
    # limits:
    #   cpu: 250m
    #   memory: 500Mi
  # @schema deprecated
  # -- DEPRECATED: Use nginx.extraServerConfig instead
  extra_server_config: ""
  # -- Extra configuration to be added to nginx.conf under the server section (templated)
  extraServerConfig: ""
  # -- Denied IP addresses
  denied_ips: ""
  # -- Denied user agents
  denied_uas: ""
  # -- SecurityContext for the nginx container
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

## Web
web:
  # @schema deprecated
  # -- DEPRECATED: Use `.Values.image` instead!
  image: ""
  # @schema deprecated
  # -- DEPRECATED: Use `.Values.image.imagePullSecrets` instead!
  imagePullSecret: ""
  # -- Number of web replicas to deploy
  replicas: 6
  # -- Seconds the pod needs to terminate gracefully
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/pod/#termination-of-pods
  terminationGracePeriodSeconds: 60
  uwsgi:
    # -- Number of uWSGI processes to run within each pod
    processes: 6
    # -- Number of uWSGI threads to run within each process
    threads: 4
  # -- Extra environment variables to be added to the web pods
  extraEnvVars: []
  autoscaler:
    # -- Enable HPA
    enabled: false
    # -- Target CPU utilization percentage
    scaler_cpu_utilization: 65
    # -- Maximum number of replicas
    max_web_replicas: 10
    # -- Minimum number of replicas
    min_web_replicas: 2
  # @schema type:[object, null]
  # -- Templated `readinessProbe` for the web container
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  readinessProbe:
    exec:
      command:
        - /bin/bash
        - -c
        - "uwsgi_curl -X HEAD -H 'Host: {{ include \"invenio.hostname\" $ }}' $(hostname):5000 /ping"
    failureThreshold: 3
    initialDelaySeconds: 5
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 1
  # @schema type:[object, null]
  # -- Templated `startupProbe` for the web container
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  startupProbe:
    exec:
      command:
        - /bin/bash
        - -c
        - "uwsgi_curl -X HEAD -H 'Host: {{ include \"invenio.hostname\" $ }}' $(hostname):5000 /ping"
    failureThreshold: 3
    initialDelaySeconds: 10
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 5
  # @schema type:[object, null]
  # -- Templated `livenessProbe` for the web container
  livenessProbe: null
  # -- Assets configuration
  assets:
    # -- Location of the static assets
    location: /opt/invenio/var/instance/static
  # -- Resources for the web container
  resources: {}
    # requests:
    #   cpu: 500m
    #   memory: 500Mi
    # limits:
    #   cpu: 1000m
    #   memory: 1Gi
  initContainers:
    # -- Resources for the copy-web-assets initContainer
    resources: {}
      # requests:
      #   cpu: '1'
      #   memory: 100Mi
      # limits:
      #   cpu: '1'
      #   memory: 100Mi
    # -- SecurityContext for the initContainers in the web pod
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  # @schema deprecated
  # -- DEPRECATED: Use `.Values.web.service.annotations` instead!
  annotations: {}
  # -- Add extra labels to the Invenio web pods
  podLabels: {}
  # -- Add extra annotations to the Invenio web pods
  podAnnotations: {}
  # -- Node labels for web pods assignment
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector: {}
  # -- Tolerations for web pods assignment
  ## Ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
  tolerations: []
  # -- Affinity rules for web pods assignment
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
  affinity: {}
  ## Invenio web service parameters
  service:
    # -- Add extra (templated) annotations to the web service
    annotations: {}
    # -- Web service type
    type: ClusterIP
  # -- SecurityContext for the web pod
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: "RuntimeDefault"
  # -- SecurityContext for the web container
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  # -- Extra secretRef or configMapRef for the `envFrom` field in the web container (templated)
  extraEnvFrom: []
    # - secretRef:
    #     name: foo
    # - configMapRef:
    #     name: bar

  # -- Extra volumeMounts for the web container
  extraVolumeMounts: []

  # -- Extra volumes for the web Pod
  extraVolumes: []

  # @schema deprecated
  # -- DEPRECATED: Use `.Values.web.deployment.spec` instead!
  deploymentSpec:
    # @schema type:[integer, null]
    # -- See API spec for `Deployment.spec.minReadySeconds`
    minReadySeconds: null
    # @schema type:[boolean, null]
    # -- See API spec for `Deployment.spec.paused`
    paused: null
    # @schema type:[integer, null]
    # -- See API spec for `Deployment.spec.progressDeadlineSeconds`
    progressDeadlineSeconds: null
    # @schema type:[integer, null]
    # -- See API spec for `Deployment.spec.revisionHistoryLimit`
    revisionHistoryLimit: null
    # @schema type:[object, null]
    # -- See API spec for `Deployment.spec.strategy`
    strategy: null

  deployment:
    # -- Extra annotations for the web Deployment
    annotations: {}
    # -- Extra labels for the web Deployment
    labels: {}
    # -- Configuration for other configurable fields in the Deployment.spec
    spec:
      # @schema type:[integer, null]
      # -- See API spec for `Deployment.spec.minReadySeconds`
      minReadySeconds: null
      # @schema type:[boolean, null]
      # -- See API spec for `Deployment.spec.paused`
      paused: null
      # @schema type:[integer, null]
      # -- See API spec for `Deployment.spec.progressDeadlineSeconds`
      progressDeadlineSeconds: null
      # @schema type:[integer, null]
      # -- See API spec for `Deployment.spec.revisionHistoryLimit`
      revisionHistoryLimit: null
      # @schema type:[object, null]
      # -- See API spec for `Deployment.spec.strategy`
      strategy: null

## Worker (Celery) configuration
worker:
  # @schema deprecated
  # -- DEPRECATED: Use `.Values.image` instead!
  image: ""
  # @schema deprecated
  # -- DEPRECATED: Use `.Values.image.imagePullSecrets` instead!
  imagePullSecret: ""
  # -- Name of the celery app to run
  app: invenio_app.celery
  # -- Number of concurrent tasks to run per worker
  concurrency: 2
  # -- Celery app log level
  log_level: INFO
  # -- Number of worker replicas to deploy
  replicas: 2
  # -- Mount path for celery run files
  run_mount_path: /var/run/celery
  # -- Path to celery PID file
  celery_pidfile: /var/run/celery/celerybeat.pid
  # -- Path to celery schedule file
  celery_schedule: /var/run/celery/celery-schedule
  # -- Extra environment variables to be added to the worker pods
  extraEnvVars: []
  # -- Resources for the worker container
  resources: {}
    # requests:
    #   cpu: 500m
    #   memory: 500Mi
    # limits:
    #   cpu: 1000m
    #   memory: 1Gi
  # -- SecurityContext for the worker Pod
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: "RuntimeDefault"
  # -- SecurityContext for the worker container
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  # -- Extra secretRef or configMapRef for the `envFrom` field in the worker container (templated)
  extraEnvFrom: []
    # - secretRef:
    #     name: foo
    # - configMapRef:
    #     name: bar

  # -- Extra volumeMounts for the worker container
  extraVolumeMounts: []

  # -- Extra volumes for the worker Pod
  extraVolumes: []

  # -- Add extra labels to the Invenio worker pods
  podLabels: {}
  # -- Add extra annotations to the Invenio worker pods
  podAnnotations: {}
  # -- Node labels for worker pods assignment
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector: {}
  # -- Tolerations for worker pods assignment
  ## Ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
  tolerations: []
  # -- Affinity rules for worker pods assignment
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
  affinity: {}
  # @schema type:[object, null]
  # -- Templated `livenessProbe` for the worker container
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  livenessProbe:
    exec:
      command:
        - /bin/bash
        - -c
        - "celery -A {{ .Values.worker.app }} inspect ping -d celery@$(hostname)"
    initialDelaySeconds: 20
    timeoutSeconds: 30
  # @schema type:[object, null]
  # -- Templated `readinessProbe` for the worker container
  readinessProbe: null
  # @schema type:[object, null]
  # -- Templated `startupProbe` for the worker container
  startupProbe: null

  # @schema deprecated
  # -- DEPRECATED: Use `.Values.worker.deployment.spec` instead!
  deploymentSpec:
    # @schema type:[integer, null]
    # -- See API spec for `Deployment.spec.minReadySeconds`
    minReadySeconds: null
    # @schema type:[boolean, null]
    # -- See API spec for `Deployment.spec.paused`
    paused: null
    # @schema type:[integer, null]
    # -- See API spec for `Deployment.spec.progressDeadlineSeconds`
    progressDeadlineSeconds: null
    # @schema type:[integer, null]
    # -- See API spec for `Deployment.spec.revisionHistoryLimit`
    revisionHistoryLimit: null
    # @schema type:[object, null]
    # -- See API spec for `Deployment.spec.strategy`
    strategy: null

  deployment:
    # -- Extra annotations for the worker Deployment
    annotations: {}
    # -- Extra labels for the worker Deployment
    labels: {}
    # -- Configuration for other configurable fields in the Deployment.spec
    spec:
      # @schema type:[integer, null]
      # -- See API spec for `Deployment.spec.minReadySeconds`
      minReadySeconds: null
      # @schema type:[boolean, null]
      # -- See API spec for `Deployment.spec.paused`
      paused: null
      # @schema type:[integer, null]
      # -- See API spec for `Deployment.spec.progressDeadlineSeconds`
      progressDeadlineSeconds: null
      # @schema type:[integer, null]
      # -- See API spec for `Deployment.spec.revisionHistoryLimit`
      revisionHistoryLimit: null
      # @schema type:[object, null]
      # -- See API spec for `Deployment.spec.strategy`
      strategy: null

