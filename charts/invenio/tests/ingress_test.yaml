suite: ingress
templates:
  - templates/ingress.yaml
release:
  name: test
set:
  invenio.hostname: "test.example.com"
  rabbitmq.auth.password: "test"
  postgresql.auth.password: "test"
tests:
  - it: is not rendered by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders an Ingress when enabled
    set:
      ingress.enabled: true
    asserts:
      - isKind:
          of: Ingress

  - it: sets ingressClassName when class is specified
    set:
      ingress.enabled: true
      ingress.class: nginx
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: adds annotations when specified
    set:
      ingress.enabled: true
      ingress.annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-body-size"]
          value: "0"

  - it: sets the correct host
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].host
          value: test.example.com
