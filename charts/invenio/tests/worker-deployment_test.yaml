suite: worker deployment
templates:
  - templates/worker-deployment.yaml
  - templates/invenio-configmap.yaml
release:
  name: test
set:
  invenio.hostname: "test.example.com"
  rabbitmq.auth.password: "test"
  postgresql.auth.password: "test"
tests:
  - it: renders a Deployment with correct component label
    asserts:
      - isKind:
          of: Deployment
        template: templates/worker-deployment.yaml
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: worker
        template: templates/worker-deployment.yaml

  - it: sets replicas from values
    set:
      worker.replicas: 4
    asserts:
      - equal:
          path: spec.replicas
          value: 4
        template: templates/worker-deployment.yaml

  - it: adds nodeSelector when set
    set:
      worker.nodeSelector:
        node-role: worker
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            node-role: worker
        template: templates/worker-deployment.yaml

  - it: adds tolerations when set
    set:
      worker.tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "worker"
          effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: dedicated
        template: templates/worker-deployment.yaml

  - it: adds pod annotations when set
    set:
      worker.podAnnotations:
        prometheus.io/scrape: "true"
    asserts:
      - exists:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
        template: templates/worker-deployment.yaml

  - it: adds extra env vars to worker container
    set:
      worker.extraEnvVars:
        - name: MY_VAR
          value: my-value
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_VAR
            value: my-value
        template: templates/worker-deployment.yaml

  - it: adds affinity when set
    set:
      worker.affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - worker
                topologyKey: kubernetes.io/hostname
    asserts:
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].weight
          value: 100
        template: templates/worker-deployment.yaml
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.topologyKey
          value: kubernetes.io/hostname
        template: templates/worker-deployment.yaml

  - it: adds deployment annotations when set
    set:
      worker.deployment.annotations:
        custom-annotation: "test"
    asserts:
      - equal:
          path: metadata.annotations["custom-annotation"]
          value: "test"
        template: templates/worker-deployment.yaml
