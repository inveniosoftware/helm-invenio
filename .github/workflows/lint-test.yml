name: Lint and Test Charts

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: v3.17.0

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.13' # 3.12 was broken and 3.14 not supported by Yamale yet
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Run chart-testing (lint)
        run: ct lint --all

      - name: Build Helm dependencies
        run: helm dependency build charts/invenio

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.6.7"
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz -C /usr/local/bin kubeconform

      - name: Template and validate (minimal values)
        run: |
          helm template ci-minimal charts/invenio \
            -f charts/invenio/ci/minimal-values.yaml \
            > /tmp/rendered-minimal.yaml
          kubeconform \
            -strict \
            -summary \
            /tmp/rendered-minimal.yaml

      - name: Template and validate (full values)
        run: |
          helm template ci-full charts/invenio \
            -f charts/invenio/ci/full-values.yaml \
            > /tmp/rendered-full.yaml
          kubeconform \
            -strict \
            -summary \
            /tmp/rendered-full.yaml

      # - name: create kind cluster
