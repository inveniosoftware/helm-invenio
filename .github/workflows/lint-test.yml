name: Lint and Test Charts

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: v3.21.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.13' # 3.12 was broken and 3.14 not supported by Yamale yet
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Run chart-testing (lint)
        run: ct lint --all

      - name: Install tools
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest.git
          KUBECONFORM_VERSION=v0.8.0
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Run unit tests
        run: helm unittest charts/invenio

      - name: Build Helm dependencies
        run: helm dependency build charts/invenio

      - name: Validate rendered manifests (minimal values)
        run: |
          helm template test charts/invenio \
            -f charts/invenio/ci/minimal-values.yaml | \
            kubeconform --strict --summary

      - name: Validate rendered manifests (full values)
        run: |
          helm template test charts/invenio \
            -f charts/invenio/ci/full-values.yaml | \
            kubeconform --strict --summary

